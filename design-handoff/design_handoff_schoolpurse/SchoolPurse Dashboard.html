/* ── Icons ──────────────────────────────────────────────── */

/* ── Theme ──────────────────────────────────────────────── */
function mkTheme(dark, accent) {
  return {
    accent,
    accentSoft: accent + (dark ? '28' : '18'),
    accentText: accent,
    sidebar: '#0b1f2e',
    bg: dark ? '#0f1923' : '#f0f3f7',
    card: dark ? '#172535' : '#ffffff',
    cardAlt: dark ? '#1e3045' : '#f8fafc',
    border: dark ? '#243650' : '#e2e8f2',
    borderStrong: dark ? '#2e4560' : '#d1d9e6',
    text: dark ? '#dce8f5' : '#14263a',
    textSub: dark ? '#8aa4be' : '#52697e',
    muted: dark ? '#5e7a94' : '#94a8bc',
    red: '#ef4444',
    redSoft: dark ? '#3d1515' : '#fff2f2',
    amber: '#f59e0b',
    amberSoft: dark ? '#3a2500' : '#fffbeb',
    green: '#22c55e',
    greenSoft: dark ? '#0b2d18' : '#f0fdf4',
  };
}

/* ── Shared components ─────────────────────────────────── */
function KPICard({ title, value, sub, trend, trendVal, t, accent, wide }) {
  const upColor = '#22c55e';
  const downColor = '#ef4444';
  return (
    <div style={{background:t.card, border:`1px solid ${t.border}`, borderRadius:12, padding:'20px 22px', position:'relative', overflow:'hidden'}}>
      <div style={{position:'absolute', top:0, left:0, width:3, height:'100%', background:accent, borderRadius:'12px 0 0 12px'}}></div>
      <div style={{fontSize:10.5, fontWeight:600, letterSpacing:'0.09em', color:t.muted, textTransform:'uppercase', marginBottom:10}}>{title}</div>
      <div style={{fontSize:26, fontWeight:700, color:t.text, letterSpacing:'-0.02em', marginBottom:7, lineHeight:1}}>{value}</div>
      <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
        {trend && (
          <span style={{display:'flex', alignItems:'center', gap:3, fontSize:11.5, fontWeight:600, color:trend==='up'?upColor:downColor}}>
            <Ico n={trend==='up'?'up':'down'} s={11} c={trend==='up'?upColor:downColor}/>
            {trendVal}
          </span>
        )}
        <span style={{fontSize:11.5, color:t.textSub}}>{sub}</span>
      </div>
    </div>
  );
}

function SectionTitle({ children, sub, action, t }) {
  return (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16}}>
      <div>
        <div style={{fontSize:14.5, fontWeight:600, color:t.text}}>{children}</div>
        {sub && <div style={{fontSize:12, color:t.textSub, marginTop:2}}>{sub}</div>}
      </div>
      {action}
    </div>
  );
}

function Card({ children, t, p=24, style={} }) {
  return (
    <div style={{background:t.card, border:`1px solid ${t.border}`, borderRadius:12, padding:p, ...style}}>
      {children}
    </div>
  );
}

function Th({ children }) {
  return (
    <th style={{textAlign:'left', padding:'9px 14px', fontSize:10.5, fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase', whiteSpace:'nowrap'}}>
      {children}
    </th>
  );
}

function StatusBadge({ days, t }) {
  const [bg, color, label] = days > 60
    ? [t.redSoft, t.red, `${days}d overdue`]
    : days > 30
    ? [t.amberSoft, t.amber, `${days}d overdue`]
    : [t.greenSoft, t.green, `${days}d overdue`];
  return (
    <span style={{background:bg, color, borderRadius:6, padding:'3px 9px', fontSize:11, fontWeight:600, display:'inline-block'}}>
      {label}
    </span>
  );
}

function Btn({ children, onClick, variant='primary', accent, t, small }) {
  const styles = {
    primary: { background:accent, color:'#fff', border:'none' },
    outline: { background:'none', color:t.textSub, border:`1px solid ${t.border}` },
    ghost: { background:'none', color:accent, border:'none' },
  };
  return (
    <button onClick={onClick} style={{
      ...styles[variant],
      display:'flex', alignItems:'center', gap:7,
      padding: small ? '7px 13px' : '9px 16px',
      borderRadius:8, fontSize: small ? 12 : 13, fontWeight:600,
      cursor:'pointer', whiteSpace:'nowrap', fontFamily:'DM Sans',
      ...styles[variant],
    }}>{children}</button>
  );
}

function SearchBar({ placeholder, t }) {
  return (
    <div style={{display:'flex', alignItems:'center', gap:8, background:t.bg, border:`1px solid ${t.border}`, borderRadius:8, padding:'7px 12px', minWidth:220}}>
      <Ico n="search" s={14} c={t.muted}/>
      <input style={{background:'none', border:'none', color:t.text, fontSize:13, outline:'none', width:'100%'}} placeholder={placeholder}/>
    </div>
  );
}

/* ── Bar Chart ──────────────────────────────────────────── */
function BarChart({ t, accent }) {
  const max = Math.max(...MONTHLY.flatMap(m=>[m.income,m.expenses]));
  const H = 130, bw = 22, gap = 6, groupW = 78;
  const total = MONTHLY.length * groupW;
  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${total} ${H+36}`} preserveAspectRatio="xMidYMax meet" style={{overflow:'visible'}}>
        {/* Grid lines */}
        {[0,.25,.5,.75,1].map((f,i)=>(
          <line key={i} x1={0} y1={H-H*f} x2={total} y2={H-H*f}
            stroke={t.border} strokeWidth={0.8} strokeDasharray={f===0?'none':'4,3'}/>
        ))}
        {MONTHLY.map((m,i)=>{
          const incH = (m.income/max)*H;
          const expH = (m.expenses/max)*H;
          const x = i*groupW + 10;
          return (
            <g key={i}>
              <rect x={x} y={H-incH} width={bw} height={incH} rx={4} fill={accent} opacity={0.88}/>
              <rect x={x+bw+gap} y={H-expH} width={bw} height={expH} rx={4} fill={t.muted} opacity={0.38}/>
              <text x={x+bw+gap/2} y={H+18} textAnchor="middle" fontSize={11} fill={t.muted} fontFamily="DM Sans, sans-serif">{m.month}</text>
              <text x={x+bw/2} y={H-incH-5} textAnchor="middle" fontSize={9} fill={t.textSub} fontFamily="DM Sans, sans-serif">${(m.income/1000).toFixed(1)}k</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:'flex', gap:18, marginTop:6}}>
        <div style={{display:'flex', alignItems:'center', gap:6, fontSize:12, color:t.textSub}}>
          <div style={{width:10, height:10, borderRadius:2, background:accent}}></div>Income
        </div>
        <div style={{display:'flex', alignItems:'center', gap:6, fontSize:12, color:t.textSub}}>
          <div style={{width:10, height:10, borderRadius:2, background:t.muted, opacity:.5}}></div>Expenses
        </div>
      </div>
    </div>
  );
}

/* ── Donut Chart ────────────────────────────────────────── */
function DonutChart({ t }) {
  const total = EXP_CATEGORIES.reduce((s,c)=>s+c.amount,0);
  let angle = -90;
  const r=54, cx=70, cy=70;
  const toRad = d => d*Math.PI/180;
  const arc = (start, deg) => {
    const end = start+deg-0.5;
    const x1=cx+r*Math.cos(toRad(start)), y1=cy+r*Math.sin(toRad(start));
    const x2=cx+r*Math.cos(toRad(end)), y2=cy+r*Math.sin(toRad(end));
    const large = deg>180?1:0;
    return `M${cx} ${cy} L${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2}Z`;
  };
  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:12}}>
      <svg width={180} height={180} viewBox="0 0 140 140" style={{flexShrink:0}}>
        {EXP_CATEGORIES.map((c,i)=>{
          const deg=(c.amount/total)*360;
          const path=arc(angle,deg);
          angle+=deg;
          return <path key={i} d={path} fill={c.color} opacity={0.88}/>;
        })}
      </svg>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:22, fontWeight:700, color:t.text, letterSpacing:'-0.02em'}}>${total.toLocaleString()}</div>
        <div style={{fontSize:11.5, color:t.muted, marginTop:2}}>Total Expenses · April 2026</div>
      </div>
      <div style={{width:'100%', display:'flex', flexDirection:'column', gap:10}}>
        {EXP_CATEGORIES.map((c,i)=>{
          const pct = Math.round((c.amount/total)*100);
          return (
          <div key={i}>
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:4}}>
              <div style={{width:9, height:9, borderRadius:3, background:c.color, flexShrink:0}}></div>
              <div style={{fontSize:12, color:t.textSub, flex:1}}>{c.name}</div>
              <div style={{fontSize:12, fontWeight:600, color:t.text}}>${c.amount.toLocaleString()}</div>
              <div style={{fontSize:11, color:t.muted, minWidth:28, textAlign:'right'}}>{pct}%</div>
            </div>
            <div style={{height:4, background:t.border, borderRadius:3, overflow:'hidden'}}>
              <div style={{width:`${pct}%`, height:'100%', background:c.color, borderRadius:3, opacity:0.8}}></div>
            </div>
          </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Progress Bar ───────────────────────────────────────── */
function ProgressBar({ pct, accent, t }) {
  return (
    <div style={{height:5, background:t.border, borderRadius:3, overflow:'hidden'}}>
      <div style={{width:`${Math.min(pct,100)}%`, height:'100%', background:accent, borderRadius:3, transition:'width 0.4s'}}></div>
    </div>
  );
}

/* ── Screen: Overview ───────────────────────────────────── */
function Overview({ t, accent, setScreen }) {
  const outstanding = ARREARS.reduce((s,a)=>s+(a.fee-a.paid),0);
  const todayPayments = PAYMENTS.filter(p=>p.date==='2026-04-28');
  const todayTotal = todayPayments.reduce((s,p)=>s+p.amount,0);
  const collectionRate = Math.round((12450/(12450+outstanding))*100);

  return (
    <div style={{display:'flex', flexDirection:'column', gap:22}}>
      {/* KPIs */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14}}>
        <KPICard title="Today's Collections" value={`$${todayTotal.toLocaleString()}`} sub={`${todayPayments.length} payments · ${todayPayments.length} receipts`} trend="up" trendVal="+12%" t={t} accent={accent}/>
        <KPICard title="April Income" value="$12,450" sub="vs $14,100 in March" trend="down" trendVal="-11.7%" t={t} accent={accent}/>
        <KPICard title="Outstanding" value={`$${outstanding.toLocaleString()}`} sub={`${ARREARS.length} students in arrears`} t={t} accent={accent}/>
        <KPICard title="Net (April)" value="+$6,855" sub="Income $12,450 · Exp $5,595" trend="up" trendVal="+22%" t={t} accent={accent}/>
      </div>

      {/* Charts row */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 320px', gap:14}}>
        <Card t={t}>
          <SectionTitle sub="Nov 2025 — Apr 2026" t={t}>Income vs Expenses</SectionTitle>
          <BarChart t={t} accent={accent}/>
        </Card>
        <Card t={t}>
          <SectionTitle sub="April 2026" t={t}>Expense Breakdown</SectionTitle>
          <DonutChart t={t}/>
        </Card>
      </div>

      {/* Collection progress */}
      <Card t={t} p={20}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <div style={{fontSize:14, fontWeight:600, color:t.text}}>Term Fee Collection Rate</div>
          <span style={{fontSize:13, fontWeight:700, color:accent}}>{collectionRate}%</span>
        </div>
        <ProgressBar pct={collectionRate} accent={accent} t={t}/>
        <div style={{display:'flex', justifyContent:'space-between', marginTop:10}}>
          <span style={{fontSize:12, color:t.textSub}}>Collected: $12,450</span>
          <span style={{fontSize:12, color:t.textSub}}>Outstanding: ${outstanding.toLocaleString()}</span>
          <span style={{fontSize:12, color:t.textSub}}>Target: ${(12450+outstanding).toLocaleString()}</span>
        </div>
      </Card>

      {/* Bottom row */}

/* ── Screen: Arrears ────────────────────────────────────── */
function ArrearsScreen({ t, accent }) {
  const [query, setQuery] = useState('');
  const total = ARREARS.reduce((s,a)=>s+(a.fee-a.paid),0);
  const critical = ARREARS.filter(a=>a.days>60).length;
  const avgDays = Math.round(ARREARS.reduce((s,a)=>s+a.days,0)/ARREARS.length);
  const filtered = ARREARS.filter(a=>
    a.name.toLowerCase().includes(query.toLowerCase()) ||
    a.class.toLowerCase().includes(query.toLowerCase())
  );

  return (
    <div style={{display:'flex', flexDirection:'column', gap:20}}>
      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14}}>
        <KPICard title="Total Outstanding" value={`$${total.toLocaleString()}`} sub={`${ARREARS.length} students`} t={t} accent={accent}/>
        <KPICard title="Critical (>60 days)" value={critical} sub="Immediate follow-up needed" t={t} accent={accent}/>
        <KPICard title="Moderate (30–60d)" value={ARREARS.filter(a=>a.days>30&&a.days<=60).length} sub="Send reminder notices" t={t} accent={accent}/>
        <KPICard title="Avg. Days Overdue" value={`${avgDays}d`} sub="Across all arrears" t={t} accent={accent}/>
      </div>

      {/* Class breakdown */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14}}>
        {['Form 1','Form 2','Form 3','Form 4','Form 5','Form 6'].map(f=>{
          const students = ARREARS.filter(a=>a.class.startsWith(f));
          if(!students.length) return null;
          const bal = students.reduce((s,a)=>s+(a.fee-a.paid),0);
          return (
            <Card key={f} t={t} p={16}>
              <div style={{fontSize:13, fontWeight:600, color:t.text, marginBottom:4}}>{f}</div>
              <div style={{fontSize:20, fontWeight:700, color:t.text, marginBottom:2}}>${bal.toLocaleString()}</div>
              <div style={{fontSize:12, color:t.textSub}}>{students.length} student{students.length>1?'s':''} in arrears</div>
              <ProgressBar pct={100-Math.round(bal/students.reduce((s,a)=>s+a.fee,0)*100)} accent={accent} t={t}/>
            </Card>
          );
        }).filter(Boolean)}
      </div>

      <Card t={t} p={0}>
        <div style={{padding:'14px 20px', borderBottom:`1px solid ${t.border}`, display:'flex', gap:12, alignItems:'center', justifyContent:'space-between'}}>
          <div style={{display:'flex', alignItems:'center', gap:8, background:t.bg, border:`1px solid ${t.border}`, borderRadius:8, padding:'7px 12px', minWidth:240}}>
            <Ico n="search" s={14} c={t.muted}/>
            <input value={query} onChange={e=>setQuery(e.target.value)} style={{background:'none', border:'none', color:t.text, fontSize:13, outline:'none', width:'100%'}} placeholder="Search by name or class…"/>
          </div>
          <div style={{display:'flex', gap:8}}>
            <Btn variant="outline" accent={accent} t={t} small><Ico n="send" s={13} c={t.muted}/> Send Reminders</Btn>
            <Btn variant="outline" accent={accent} t={t} small><Ico n="dl" s={13} c={t.muted}/> Export CSV</Btn>
          </div>
        </div>
        <table style={{width:'100%', borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:t.cardAlt}}>
              {['Student','Class','Term Fee','Paid','Balance','Status','Action'].map(h=>(
                <th key={h} style={{textAlign:'left', padding:'9px 16px', fontSize:10.5, color:t.muted, fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(a=>(
              <tr key={a.id} style={{borderTop:`1px solid ${t.border}`}}>
                <td style={{padding:'12px 16px', fontSize:13, color:t.text, fontWeight:500}}>{a.name}</td>
                <td style={{padding:'12px 16px', fontSize:12.5, color:t.textSub}}>{a.class}</td>
                <td style={{padding:'12px 16px', fontSize:13, color:t.textSub}}>${a.fee}</td>
                <td style={{padding:'12px 16px', fontSize:13, color:t.textSub}}>${a.paid}</td>
                <td style={{padding:'12px 16px', fontSize:13, fontWeight:700, color:a.days>60?t.red:t.text}}>${a.fee-a.paid}</td>
                <td style={{padding:'12px 16px'}}><StatusBadge days={a.days} t={t}/></td>
                <td style={{padding:'12px 16px'}}>
                  <button style={{background:t.accentSoft, color:accent, border:'none', borderRadius:7, padding:'6px 11px', fontSize:11.5, fontWeight:600, cursor:'pointer', fontFamily:'DM Sans', whiteSpace:'nowrap'}}>
                    Record Payment
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length===0 && (
          <div style={{padding:40, textAlign:'center', color:t.muted, fontSize:13}}>No students match your search.</div>
        )}
      </Card>
    </div>
  );
}

      <Card t={t}>
        <SectionTitle sub="November 2025 — April 2026 · Monthly comparison" t={t}>

        </SectionTitle>
        <BarChart t={t} accent={accent}/>
      </Card>

      <Card t={t} p={0}>
        <div style={{padding:'14px 20px', borderBottom:`1px solid ${t.border}`, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div style={{fontSize:14.5, fontWeight:600, color:t.text}}>Monthly P&amp;L Summary</div>

            <tr style={{background:t.cardAlt}}>
              {['Month','Income','Expenses','Net Surplus','Margin'].map(h=>(
                <th key={h} style={{textAlign:'left', padding:'9px 16px', fontSize:10.5, color:t.muted, fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[...MONTHLY].reverse().map((m,i)=>{
              const net=m.income-m.expenses;
              const margin=((net/m.income)*100).toFixed(1);
              return (
                <tr key={i} style={{borderTop:`1px solid ${t.border}`}}>
                  <td style={{padding:'12px 16px', fontSize:13, color:t.text, fontWeight:500}}>{m.month} {m.month==='Nov'||m.month==='Dec'?2025:2026}</td>

                      </div>
                      <span style={{fontSize:12, fontWeight:600, color:t.textSub}}>{margin}%</span>
                    </div>
                  </td>

/* ── App ────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState('overview');
  const [dark, setDark] = useState(false);
  const [accent, setAccent] = useState('#22c27a');
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(()=>{
    const handler = e => {
      if(e.data?.type==='__activate_edit_mode') setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=>window.removeEventListener('message', handler);
  }, []);

  const t = mkTheme(dark, accent);

  const screenMap = {
    overview: <Overview t={t} accent={accent} setScreen={setScreen}/>,
    payments: <PaymentsScreen t={t} accent={accent}/>,
    arrears:  <ArrearsScreen t={t} accent={accent}/>,
    expenses: <ExpensesScreen t={t} accent={accent}/>,
    reports:  <ReportsScreen t={t} accent={accent}/>,
    settings: <SettingsScreen t={t} accent={accent}/>,
  };

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden', fontFamily:'DM Sans, sans-serif', background:t.bg}}>
      <Sidebar screen={screen} setScreen={setScreen} dark={dark} setDark={setDark} accent={accent}/>
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        <TopBar screen={screen} t={t} accent={accent} setScreen={setScreen}/>
        <div style={{flex:1, overflowY:'auto', padding:'24px 28px 40px'}}>
          {screenMap[screen]}
        </div>
      </div>
      {tweaksOpen && (
        <TweaksPanel accent={accent} setAccent={setAccent} dark={dark} setDark={setDark}
          onClose={()=>{setTweaksOpen(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
